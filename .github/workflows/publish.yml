name: Publish

# Manual one-shot publish via Trusted Publishing (OIDC).
# Configure the Trusted Publisher on npmjs.com for each package:
#   Repository: hebee935/space
#   Workflow filename: publish.yml
#   Environment: (leave empty)
on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm -w turbo run build --filter='!playground'

      # space-api depends on space-ui via workspace:*, so publish ui first.
      - run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/api-ui

      - run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/api
