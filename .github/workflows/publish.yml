name: Publish

# Manual publish via Trusted Publishing (OIDC). The UI is bundled inside
# @puppledoc/nestjs-api-reference at publish time, so only one package
# is pushed to the registry.
#
# Configure the Trusted Publisher for @puppledoc/nestjs-api-reference on
# npmjs.com before running this workflow:
#   Repository: hebee935/space
#   Workflow filename: publish.yml
#   Environment: (leave empty)
on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm >= 11.5.1. Node 20 ships with
      # a stable npm 10.x that can cleanly install npm@11 on top;
      # Node 22's bundled npm intermittently corrupts itself on self-upgrade.
      - run: npm install -g npm@11

      - run: pnpm install --frozen-lockfile
      - run: pnpm -w turbo run build --filter='!playground'

      # prepublishOnly re-runs `tsup` and copies ../api-ui/dist into ./ui so
      # the tarball ships with the bundled docs UI.
      - run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/api
